global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'chat_server'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'host.docker.internal:9100'  # Update to match METRICS_PORT; on Linux use host-gateway or container name.
