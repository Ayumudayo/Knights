global
  maxconn 10000

defaults
  mode tcp
  timeout connect 3s
  timeout client  60s
  timeout server  60s

frontend fe_gateway_tls13
  bind 0.0.0.0:6000 ssl crt /usr/local/etc/haproxy/certs/edge.pem ssl-min-ver TLSv1.3 no-tls-tickets
  default_backend be_gateway_mtls

frontend fe_gateway_tls_legacy_exception
  bind 0.0.0.0:6001 ssl crt /usr/local/etc/haproxy/certs/edge.pem ssl-min-ver TLSv1.2 ssl-max-ver TLSv1.2 no-tls-tickets
  tcp-request inspect-delay 5s
  acl allow_legacy_sni req.ssl_sni -f /usr/local/etc/haproxy/legacy-allowlist.lst
  tcp-request content reject unless allow_legacy_sni
  default_backend be_gateway_mtls

backend be_gateway_mtls
  balance roundrobin
  server gw1 gateway-1:6000 ssl verify required ca-file /usr/local/etc/haproxy/certs/internal-ca.pem check
  server gw2 gateway-2:6000 ssl verify required ca-file /usr/local/etc/haproxy/certs/internal-ca.pem check

listen stats
  bind 0.0.0.0:8404
  mode http
  stats enable
  stats uri /
  http-request use-service prometheus-exporter if { path /metrics }
