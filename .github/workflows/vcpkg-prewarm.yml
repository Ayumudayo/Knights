name: Vcpkg Prewarm

on:
  workflow_dispatch:
    inputs:
      target:
        description: Build target to warm dependencies
        required: false
        default: core_public_api_headers_compile
  pull_request:
    paths:
      - ".github/workflows/vcpkg-prewarm.yml"
  schedule:
    - cron: "17 19 * * *"

permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

concurrency:
  group: vcpkg-prewarm-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows-vcpkg-prewarm:
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      VCPKG_FEATURE_FLAGS: manifests,binarycaching
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/archives
      VCPKG_BINARY_SOURCES: clear;files,${{ github.workspace }}/.cache/vcpkg/archives,readwrite
      VCPKG_DOWNLOADS: ${{ github.workspace }}/.cache/vcpkg/downloads
      VCPKG_INSTALLED_DIR: ${{ github.workspace }}/build-windows/vcpkg_installed
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Mark vcpkg cache restore start (Windows)
        shell: pwsh
        run: |
          "VCPKG_CACHE_RESTORE_START=$(Get-Date -AsUTC -Format o)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Restore vcpkg artifacts cache (Windows)
        id: vcpkg_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: |
            .cache/vcpkg/archives
            .cache/vcpkg/downloads
            vcpkg_installed
            build-windows/vcpkg_installed
          key: ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json', 'scripts/setup_vcpkg.ps1', 'cmake/knights_vcpkg_toolchain.cmake') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-${{ hashFiles('vcpkg.json') }}-
            ${{ runner.os }}-vcpkg-

      - name: Summarize vcpkg cache restore (Windows)
        shell: pwsh
        run: |
          $start = [DateTime]::Parse($env:VCPKG_CACHE_RESTORE_START)
          $elapsed = [Math]::Round(((Get-Date).ToUniversalTime() - $start).TotalSeconds, 2)
          $hit = '${{ steps.vcpkg_cache_restore.outputs.cache-hit }}'
          if ([string]::IsNullOrWhiteSpace($hit)) { $hit = 'false' }
          $matchedKey = '${{ steps.vcpkg_cache_restore.outputs.cache-matched-key }}'
          if ([string]::IsNullOrWhiteSpace($matchedKey)) { $matchedKey = 'N/A' }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### vcpkg cache telemetry (prewarm)'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_hit: {0}" -f $hit)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_elapsed_sec: {0}" -f $elapsed)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- restore_key: {0}" -f $matchedKey)

      - name: Ensure vcpkg cache directories (Windows)
        shell: pwsh
        run: |
          $buildInstalled = "${{ github.workspace }}/build-windows/vcpkg_installed"
          $rootInstalled = "${{ github.workspace }}/vcpkg_installed"
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/.cache/vcpkg/archives" | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/.cache/vcpkg/downloads" | Out-Null
          New-Item -ItemType Directory -Force -Path $buildInstalled | Out-Null
          if (-not (Test-Path $rootInstalled)) {
            New-Item -ItemType Junction -Path $rootInstalled -Target $buildInstalled | Out-Null
          }

      - name: Enable MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Select prewarm target
        shell: pwsh
        run: |
          $target = '${{ github.event.inputs.target }}'
          if ([string]::IsNullOrWhiteSpace($target)) { $target = 'core_public_api_headers_compile' }
          "PREWARM_TARGET=$target" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- prewarm_target: {0}" -f $target)

      - name: Configure (Debug)
        shell: pwsh
        run: |
          cmake --preset windows -DVCPKG_MANIFEST_INSTALL=ON -DKNIGHTS_ENABLE_CORE_RUDP=OFF

      - name: Build prewarm target (Debug)
        shell: pwsh
        run: |
          cmake --build --preset windows-debug --target $env:PREWARM_TARGET --parallel

      - name: Mark vcpkg cache save start (Windows)
        if: success() && steps.vcpkg_cache_restore.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          "VCPKG_CACHE_SAVE_START=$(Get-Date -AsUTC -Format o)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Save vcpkg artifacts cache (Windows)
        if: success() && steps.vcpkg_cache_restore.outputs.cache-hit != 'true'
        id: vcpkg_cache_save
        uses: actions/cache/save@v4
        with:
          path: |
            .cache/vcpkg/archives
            .cache/vcpkg/downloads
            vcpkg_installed
            build-windows/vcpkg_installed
          key: ${{ steps.vcpkg_cache_restore.outputs.cache-primary-key }}

      - name: Summarize vcpkg cache save (Windows)
        if: always()
        shell: pwsh
        run: |
          $saveOutcome = '${{ steps.vcpkg_cache_save.outcome }}'
          if ([string]::IsNullOrWhiteSpace($saveOutcome)) { $saveOutcome = 'unknown' }
          if ('${{ steps.vcpkg_cache_restore.outputs.cache-hit }}' -eq 'true') {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '- save_skipped: true (exact cache hit)'
            return
          }
          if ([string]::IsNullOrWhiteSpace($env:VCPKG_CACHE_SAVE_START)) {
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- save_status: {0}" -f $saveOutcome)
            return
          }
          $start = [DateTime]::Parse($env:VCPKG_CACHE_SAVE_START)
          $elapsed = [Math]::Round(((Get-Date).ToUniversalTime() - $start).TotalSeconds, 2)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- save_status: {0}" -f $saveOutcome)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- save_elapsed_sec: {0}" -f $elapsed)
