global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'chat_server'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'server-1:9090'
          - 'server-2:9090'

  - job_name: 'gateway'
    metrics_path: /metrics
    static_configs:
      - targets: ['gateway:6001']

  - job_name: 'load_balancer'
    metrics_path: /metrics
    static_configs:
      - targets: ['load_balancer:7002']
