global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'chat_server'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'server-1:9090'
          - 'server-2:9090'

  - job_name: 'gateway'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'gateway-1:6001'
          - 'gateway-2:6001'

  - job_name: 'haproxy'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'haproxy:8404'

  - job_name: 'redis'
    static_configs:
      - targets:
          - 'redis_exporter:9121'

  - job_name: 'postgres'
    static_configs:
      - targets:
          - 'postgres_exporter:9187'

  - job_name: 'write_behind'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'wb_worker:9090'

  - job_name: 'admin_app'
    metrics_path: /metrics
    static_configs:
      - targets:
          - 'admin-app:39200'
