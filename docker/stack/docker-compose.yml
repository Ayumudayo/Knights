x-server: &server
  image: dynaxis-server:local
  pull_policy: never

x-server-build: &server-build
  <<: *server
  build:
    context: ../..
    dockerfile: Dockerfile
    target: server-runtime

x-gateway: &gateway
  image: dynaxis-gateway:local
  pull_policy: never

x-gateway-build: &gateway-build
  <<: *gateway
  build:
    context: ../..
    dockerfile: Dockerfile
    target: gateway-runtime

x-worker: &worker
  image: dynaxis-worker:local
  pull_policy: never

x-worker-build: &worker-build
  <<: *worker
  build:
    context: ../..
    dockerfile: Dockerfile
    target: worker-runtime

x-admin: &admin
  image: dynaxis-admin:local
  pull_policy: never

x-admin-build: &admin-build
  <<: *admin
  build:
    context: ../..
    dockerfile: Dockerfile
    target: admin-runtime

x-migrator: &migrator
  image: dynaxis-migrator:local
  pull_policy: never

x-migrator-build: &migrator-build
  <<: *migrator
  build:
    context: ../..
    dockerfile: Dockerfile
    target: migrator-runtime

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dynaxis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-dynaxis_db}
    ports:
      - "${POSTGRES_HOST_PORT:-35432}:5432"
    volumes:
      - dynaxis_stack_postgres_data:/var/lib/postgresql/data
    networks:
      - dynaxis-stack
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dynaxis} -d ${POSTGRES_DB:-dynaxis_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-36379}:6379"
    volumes:
      - dynaxis_stack_redis_data:/data
    networks:
      - dynaxis-stack
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrator:
    <<: *migrator-build
    command: ["migrate"]
    environment:
      DB_URI: postgresql://${POSTGRES_USER:-dynaxis}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-dynaxis_db}
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dynaxis-stack

  server-1:
    <<: *server-build
    command: ["server"]
    environment:
      PORT: "5000"
      DB_URI: postgresql://${POSTGRES_USER:-dynaxis}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-dynaxis_db}
      REDIS_URI: tcp://redis:6379
      USE_REDIS_PUBSUB: "1"
      REDIS_CHANNEL_PREFIX: "dynaxis:"
      WRITE_BEHIND_ENABLED: "1"
      REDIS_STREAM_KEY: "session_events"
      SERVER_INSTANCE_ID: "server-1"
      SERVER_ADVERTISE_HOST: "server-1"
      SERVER_ADVERTISE_PORT: "5000"
      SERVER_SHARD: "stack-shard-a"
      SERVER_REGISTRY_PREFIX: "gateway/instances/"
      SERVER_REGISTRY_TTL: "30"
      SERVER_HEARTBEAT_INTERVAL: "5"
      GATEWAY_ID: "server-1"
      METRICS_PORT: "9090"
      RECENT_HISTORY_LIMIT: "20"
      CHAT_HOOK_PLUGINS_DIR: "/app/plugins"
      CHAT_HOOK_FALLBACK_PLUGINS_DIR: "/app/plugins_builtin"
      CHAT_HOOK_ENABLED: "${CHAT_HOOK_ENABLED:-0}"
      CHAT_HOOK_CACHE_DIR: "/tmp/chat_hook_cache"
      CHAT_HOOK_RELOAD_INTERVAL_MS: "500"
      LUA_ENABLED: "${LUA_ENABLED:-0}"
      LUA_SCRIPTS_DIR: "/app/scripts"
      LUA_FALLBACK_SCRIPTS_DIR: "/app/scripts_builtin"
      SESSION_CONTINUITY_ENABLED: "${SESSION_CONTINUITY_ENABLED:-0}"
      SESSION_CONTINUITY_LEASE_TTL_SEC: "${SESSION_CONTINUITY_LEASE_TTL_SEC:-900}"
      ADMIN_COMMAND_SIGNING_SECRET: "${ADMIN_COMMAND_SIGNING_SECRET:-dev-admin-command-secret}"
      ADMIN_COMMAND_TTL_MS: "${ADMIN_COMMAND_TTL_MS:-60000}"
      ADMIN_COMMAND_FUTURE_SKEW_MS: "${ADMIN_COMMAND_FUTURE_SKEW_MS:-5000}"
      SERVER_DRAIN_TIMEOUT_MS: "${SERVER_DRAIN_TIMEOUT_MS:-15000}"
      SERVER_DRAIN_POLL_MS: "${SERVER_DRAIN_POLL_MS:-100}"
      RUNTIME_TRACING_ENABLED: "${RUNTIME_TRACING_ENABLED:-0}"
      RUNTIME_TRACING_SAMPLE_PERCENT: "${RUNTIME_TRACING_SAMPLE_PERCENT:-100}"
    volumes:
      - ./plugins:/app/plugins:ro
      - ./scripts:/app/scripts:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - dynaxis-stack
    ports:
      - "${SERVER1_HOST_PORT:-30001}:5000"
      - "${SERVER1_METRICS_HOST_PORT:-39091}:9090"

  server-2:
    <<: *server
    command: ["server"]
    environment:
      PORT: "5000"
      DB_URI: postgresql://${POSTGRES_USER:-dynaxis}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-dynaxis_db}
      REDIS_URI: tcp://redis:6379
      USE_REDIS_PUBSUB: "1"
      REDIS_CHANNEL_PREFIX: "dynaxis:"
      WRITE_BEHIND_ENABLED: "1"
      REDIS_STREAM_KEY: "session_events"
      SERVER_INSTANCE_ID: "server-2"
      SERVER_ADVERTISE_HOST: "server-2"
      SERVER_ADVERTISE_PORT: "5000"
      SERVER_SHARD: "stack-shard-b"
      SERVER_REGISTRY_PREFIX: "gateway/instances/"
      SERVER_REGISTRY_TTL: "30"
      SERVER_HEARTBEAT_INTERVAL: "5"
      GATEWAY_ID: "server-2"
      METRICS_PORT: "9090"
      RECENT_HISTORY_LIMIT: "20"
      CHAT_HOOK_PLUGINS_DIR: "/app/plugins"
      CHAT_HOOK_FALLBACK_PLUGINS_DIR: "/app/plugins_builtin"
      CHAT_HOOK_ENABLED: "${CHAT_HOOK_ENABLED:-0}"
      CHAT_HOOK_CACHE_DIR: "/tmp/chat_hook_cache"
      CHAT_HOOK_RELOAD_INTERVAL_MS: "500"
      LUA_ENABLED: "${LUA_ENABLED:-0}"
      LUA_SCRIPTS_DIR: "/app/scripts"
      LUA_FALLBACK_SCRIPTS_DIR: "/app/scripts_builtin"
      SESSION_CONTINUITY_ENABLED: "${SESSION_CONTINUITY_ENABLED:-0}"
      SESSION_CONTINUITY_LEASE_TTL_SEC: "${SESSION_CONTINUITY_LEASE_TTL_SEC:-900}"
      ADMIN_COMMAND_SIGNING_SECRET: "${ADMIN_COMMAND_SIGNING_SECRET:-dev-admin-command-secret}"
      ADMIN_COMMAND_TTL_MS: "${ADMIN_COMMAND_TTL_MS:-60000}"
      ADMIN_COMMAND_FUTURE_SKEW_MS: "${ADMIN_COMMAND_FUTURE_SKEW_MS:-5000}"
      SERVER_DRAIN_TIMEOUT_MS: "${SERVER_DRAIN_TIMEOUT_MS:-15000}"
      SERVER_DRAIN_POLL_MS: "${SERVER_DRAIN_POLL_MS:-100}"
      RUNTIME_TRACING_ENABLED: "${RUNTIME_TRACING_ENABLED:-0}"
      RUNTIME_TRACING_SAMPLE_PERCENT: "${RUNTIME_TRACING_SAMPLE_PERCENT:-100}"
    volumes:
      - ./plugins:/app/plugins:ro
      - ./scripts:/app/scripts:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - dynaxis-stack
    ports:
      - "${SERVER2_HOST_PORT:-30002}:5000"
      - "${SERVER2_METRICS_HOST_PORT:-39092}:9090"

  wb_worker:
    <<: *worker-build
    command: ["worker"]
    environment:
      DB_URI: postgresql://${POSTGRES_USER:-dynaxis}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-dynaxis_db}
      REDIS_URI: tcp://redis:6379
      REDIS_STREAM_KEY: "session_events"
      WB_GROUP: "wb_group"
      WB_CONSUMER: "worker-1"
      METRICS_PORT: "9090"
      RUNTIME_TRACING_ENABLED: "${RUNTIME_TRACING_ENABLED:-0}"
      RUNTIME_TRACING_SAMPLE_PERCENT: "${RUNTIME_TRACING_SAMPLE_PERCENT:-100}"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - dynaxis-stack
    ports:
      - "${WB_WORKER_METRICS_HOST_PORT:-39093}:9090"

  admin-app:
    <<: *admin-build
    command: ["admin"]
    environment:
      REDIS_URI: tcp://redis:6379
      REDIS_CHANNEL_PREFIX: "dynaxis:"
      SERVER_REGISTRY_PREFIX: "gateway/instances/"
      SERVER_REGISTRY_TTL: "30"
      GATEWAY_SESSION_PREFIX: "gateway/session/"
      WB_WORKER_METRICS_URL: "http://wb_worker:9090/metrics"
      METRICS_PORT: "39200"
      ADMIN_POLL_INTERVAL_MS: "1000"
      GRAFANA_BASE_URL: "http://127.0.0.1:${GRAFANA_HOST_PORT:-33000}"
      PROMETHEUS_BASE_URL: "http://127.0.0.1:${PROMETHEUS_HOST_PORT:-39090}"
      ADMIN_COMMAND_SIGNING_SECRET: "${ADMIN_COMMAND_SIGNING_SECRET:-dev-admin-command-secret}"
      CHAT_HOOK_PLUGINS_DIR: "/app/plugins"
      CHAT_HOOK_FALLBACK_PLUGINS_DIR: "/app/plugins"
      LUA_SCRIPTS_DIR: "/app/scripts"
      LUA_FALLBACK_SCRIPTS_DIR: "/app/scripts"
      ADMIN_EXT_FORCE_FAIL_WAVE_INDEX: "${ADMIN_EXT_FORCE_FAIL_WAVE_INDEX:-0}"
    volumes:
      - ./plugins:/app/plugins:ro
      - ./scripts:/app/scripts:ro
    depends_on:
      redis:
        condition: service_healthy
      wb_worker:
        condition: service_started
      migrator:
        condition: service_completed_successfully
    networks:
      - dynaxis-stack
    ports:
      - "${ADMIN_APP_HOST_PORT:-39200}:39200"
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/39200 && printf 'GET /healthz HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && IFS= read -r line <&3 && [[ \"$$line\" == *\" 200 \"* ]]"]
      interval: 5s
      timeout: 5s
      retries: 10

  gateway-1:
    <<: *gateway-build
    command: ["gateway"]
    environment:
      GATEWAY_LISTEN: "0.0.0.0:6000"
      GATEWAY_UDP_LISTEN: "${GATEWAY1_UDP_LISTEN:-}"
      GATEWAY_UDP_BIND_SECRET: "${GATEWAY_UDP_BIND_SECRET:-}"
      GATEWAY_UDP_BIND_TTL_MS: "${GATEWAY_UDP_BIND_TTL_MS:-5000}"
      GATEWAY_UDP_BIND_FAIL_WINDOW_MS: "${GATEWAY_UDP_BIND_FAIL_WINDOW_MS:-10000}"
      GATEWAY_UDP_BIND_FAIL_LIMIT: "${GATEWAY_UDP_BIND_FAIL_LIMIT:-5}"
      GATEWAY_UDP_BIND_BLOCK_MS: "${GATEWAY_UDP_BIND_BLOCK_MS:-60000}"
      GATEWAY_RUDP_ENABLE: "${GATEWAY_RUDP_ENABLE:-0}"
      GATEWAY_RUDP_CANARY_PERCENT: "${GATEWAY_RUDP_CANARY_PERCENT:-0}"
      GATEWAY_RUDP_OPCODE_ALLOWLIST: "${GATEWAY_RUDP_OPCODE_ALLOWLIST:-}"
      GATEWAY_ID: "gw1"
      REDIS_URI: "tcp://redis:6379"
      SESSION_CONTINUITY_LEASE_TTL_SEC: "${SESSION_CONTINUITY_LEASE_TTL_SEC:-900}"
      SERVER_REGISTRY_PREFIX: "gateway/instances/"
      SERVER_REGISTRY_TTL: "30"
      ALLOW_ANONYMOUS: "1"
      METRICS_PORT: "6001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dynaxis-stack
    ports:
      - "${GATEWAY1_TCP_HOST_PORT:-36100}:6000"
      - "${GATEWAY1_METRICS_HOST_PORT:-36001}:6001"
      - "${GATEWAY1_UDP_HOST_PORT:-7000}:7000/udp"

  gateway-2:
    <<: *gateway
    command: ["gateway"]
    environment:
      GATEWAY_LISTEN: "0.0.0.0:6000"
      GATEWAY_UDP_LISTEN: "${GATEWAY2_UDP_LISTEN:-}"
      GATEWAY_UDP_BIND_SECRET: "${GATEWAY_UDP_BIND_SECRET:-}"
      GATEWAY_UDP_BIND_TTL_MS: "${GATEWAY_UDP_BIND_TTL_MS:-5000}"
      GATEWAY_UDP_BIND_FAIL_WINDOW_MS: "${GATEWAY_UDP_BIND_FAIL_WINDOW_MS:-10000}"
      GATEWAY_UDP_BIND_FAIL_LIMIT: "${GATEWAY_UDP_BIND_FAIL_LIMIT:-5}"
      GATEWAY_UDP_BIND_BLOCK_MS: "${GATEWAY_UDP_BIND_BLOCK_MS:-60000}"
      GATEWAY_RUDP_ENABLE: "${GATEWAY_RUDP_ENABLE:-0}"
      GATEWAY_RUDP_CANARY_PERCENT: "${GATEWAY_RUDP_CANARY_PERCENT:-0}"
      GATEWAY_RUDP_OPCODE_ALLOWLIST: "${GATEWAY_RUDP_OPCODE_ALLOWLIST:-}"
      GATEWAY_ID: "gw2"
      REDIS_URI: "tcp://redis:6379"
      SESSION_CONTINUITY_LEASE_TTL_SEC: "${SESSION_CONTINUITY_LEASE_TTL_SEC:-900}"
      SERVER_REGISTRY_PREFIX: "gateway/instances/"
      SERVER_REGISTRY_TTL: "30"
      ALLOW_ANONYMOUS: "1"
      METRICS_PORT: "6001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dynaxis-stack
    ports:
      - "${GATEWAY2_TCP_HOST_PORT:-36101}:6000"
      - "${GATEWAY2_METRICS_HOST_PORT:-36002}:6001"
      - "${GATEWAY2_UDP_HOST_PORT:-7001}:7000/udp"

  haproxy:
    image: haproxy:2.9-alpine
    depends_on:
      - gateway-1
      - gateway-2
    ports:
      - "${HAPROXY_HOST_PORT:-6000}:6000"
      - "${HAPROXY_STATS_HOST_PORT:-8404}:8404"
    volumes:
      - ./haproxy/${HAPROXY_CONFIG:-haproxy.cfg}:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - dynaxis-stack

  prometheus:
    image: prom/prometheus:latest
    profiles: ["observability"]
    volumes:
      - ../observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
    ports:
      - "${PROMETHEUS_HOST_PORT:-39090}:9090"
    networks:
      - dynaxis-stack

  grafana:
    image: grafana/grafana:latest
    profiles: ["observability"]
    ports:
      - "${GRAFANA_HOST_PORT:-33000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ../observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - dynaxis-stack

  redis_exporter:
    image: oliver006/redis_exporter:latest
    profiles: ["observability"]
    command:
      - "--redis.addr=redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "${REDIS_EXPORTER_HOST_PORT:-39121}:9121"
    networks:
      - dynaxis-stack

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    profiles: ["observability"]
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-dynaxis}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-dynaxis_db}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${POSTGRES_EXPORTER_HOST_PORT:-39187}:9187"
    networks:
      - dynaxis-stack

volumes:
  dynaxis_stack_postgres_data:
  dynaxis_stack_redis_data:

networks:
  dynaxis-stack:
    driver: bridge
