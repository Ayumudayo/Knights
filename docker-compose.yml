services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "35432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - knights-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "36379:6379"
    volumes:
      - redis_data:/data
    networks:
      - knights-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  server-1:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: never
    command: [ "server" ]
    environment:
      GATEWAY_ID: gw1
      PORT: ${SERVER_PORT_1}
      DB_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URI: tcp://redis:6379
      WRITE_BEHIND_ENABLED: "1"
      USE_REDIS_PUBSUB: "1"
      REDIS_CHANNEL_PREFIX: "knights:"
      SERVER_INSTANCE_ID: server-1
      SERVER_ADVERTISE_HOST: server-1
      SERVER_ADVERTISE_PORT: ${SERVER_PORT_1}
      SERVER_REGISTRY_PREFIX: "server:registry:"
      METRICS_PORT: 9090
    ports:
      - "30001:${SERVER_PORT_1}"
      - "39091:9090" # Expose metrics for manual check
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - knights-net

  server-2:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: never
    command: [ "server" ]
    environment:
      GATEWAY_ID: gw2
      PORT: ${SERVER_PORT_2}
      DB_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URI: tcp://redis:6379
      WRITE_BEHIND_ENABLED: "1"
      USE_REDIS_PUBSUB: "1"
      REDIS_CHANNEL_PREFIX: "knights:"
      SERVER_INSTANCE_ID: server-2
      SERVER_ADVERTISE_HOST: server-2
      SERVER_ADVERTISE_PORT: ${SERVER_PORT_2}
      SERVER_REGISTRY_PREFIX: "server:registry:"
      METRICS_PORT: 9090
    ports:
      - "30002:${SERVER_PORT_2}"
      - "39092:9090" # Expose metrics for manual check
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - knights-net

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./docker/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "39090:9090"
    networks:
      - knights-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "33000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/observability/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - knights-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: never
    command: [ "gateway" ]
    ports:
      - "36000:6000"
      - "36001:6001"
    environment:
      GATEWAY_LISTEN: "0.0.0.0:6000"
      GATEWAY_ID: "gw1"
      REDIS_URI: "tcp://redis:6379"
      METRICS_PORT: "6001"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - knights-net

  migrator:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: never
    command: [ "migrate" ]
    environment:
      DB_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MIGRATIONS_DIR: /app/migrations
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knights-net
    profiles:
      - tools

  wb_worker:
    build: .
    command: [ "worker" ]
    environment:
      DB_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URI: tcp://redis:6379
      WB_CONSUMER: worker-1
      WB_GROUP_DLQ: wb_dlq_group
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - knights-net

  wb_dlq_replayer:
    build: .
    command: [ "replayer" ]
    environment:
      DB_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URI: tcp://redis:6379
      WB_DLQ_BATCH: ${WB_DLQ_BATCH}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - knights-net
    profiles:
      - tools # Only start when explicitly requested or with --profile tools

volumes:
  postgres_data:
  redis_data:


networks:
  knights-net:
    driver: bridge
