name: Windows SCCache PoC

on:
  workflow_dispatch:
    inputs:
      target:
        description: Build target for PoC
        required: false
        default: core_general_tests
      double_build:
        description: Run clean-first second build for cache-hit check (true/false)
        required: false
        default: "true"

permissions:
  contents: read

env:
  PYTHONIOENCODING: utf-8

jobs:
  windows-sccache-poc:
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      CONAN_HOME: ${{ github.workspace }}-conan2
      SCCACHE_DIR: ${{ github.workspace }}/.cache/sccache
      SCCACHE_CACHE_SIZE: 10G
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Restore Conan cache (Windows)
        id: conan_cache_restore
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ runner.os }}-conan2-${{ hashFiles('conan.lock', 'conanfile.py', 'conan/profiles/**', 'scripts/setup_conan.ps1', 'scripts/build.ps1') }}
          restore-keys: |
            ${{ runner.os }}-conan2-

      - name: Restore sccache artifacts cache (Windows)
        id: sccache_restore
        uses: actions/cache/restore@v4
        with:
          path: .cache/sccache
          key: ${{ runner.os }}-sccache-${{ github.ref_name }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', 'conanfile.py', 'conan.lock', 'conan/profiles/**', 'scripts/setup_conan.ps1') }}
          restore-keys: |
            ${{ runner.os }}-sccache-${{ github.ref_name }}-
            ${{ runner.os }}-sccache-

      - name: Ensure cache directories (Windows)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ env.CONAN_HOME }}" | Out-Null
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}/.cache/sccache" | Out-Null

      - name: Ensure lockfile exists
        shell: pwsh
        run: |
          if (-not (Test-Path "conan.lock")) {
            throw "conan.lock is required for reproducible Conan SCCache PoC runs"
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Conan2
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "conan>=2.0,<3"
          conan --version

      - name: Install sccache
        shell: pwsh
        run: |
          choco install sccache -y --no-progress

      - name: Enable MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1

      - name: Select PoC parameters
        shell: pwsh
        run: |
          $target = '${{ github.event.inputs.target }}'
          if ([string]::IsNullOrWhiteSpace($target)) { $target = 'core_general_tests' }
          "POC_TARGET=$target" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $double = '${{ github.event.inputs.double_build }}'
          if ([string]::IsNullOrWhiteSpace($double)) { $double = 'true' }
          "POC_DOUBLE_BUILD=$double" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '### sccache PoC parameters'
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- target: {0}" -f $target)
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- double_build: {0}" -f $double)

      - name: Prepare Conan dependencies (Release)
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/setup_conan.ps1 -Config Release -Feature windows-dev -BuildDir build-windows-sccache-conan

      - name: Configure with sccache (Ninja, Release)
        shell: pwsh
        run: |
          cmake -S . -B build-windows-sccache-conan -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/build-windows-sccache-conan/conan/build/Release/generators/conan_toolchain.cmake" -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_MAP_IMPORTED_CONFIG_RELWITHDEBINFO=Release -DCMAKE_MAP_IMPORTED_CONFIG_MINSIZEREL=Release

      - name: Build pass #1
        shell: pwsh
        run: |
          sccache --stop-server | Out-Null
          sccache --start-server
          sccache --zero-stats
          $first = Measure-Command { cmake --build build-windows-sccache-conan --target $env:POC_TARGET --parallel }
          $firstSec = [Math]::Round($first.TotalSeconds, 2)
          "POC_FIRST_BUILD_SEC=$firstSec" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- build_pass_1_sec: {0}" -f $firstSec)

      - name: Build pass #2 (clean-first)
        if: env.POC_DOUBLE_BUILD == 'true'
        shell: pwsh
        run: |
          $second = Measure-Command { cmake --build build-windows-sccache-conan --target $env:POC_TARGET --clean-first --parallel }
          $secondSec = [Math]::Round($second.TotalSeconds, 2)
          "POC_SECOND_BUILD_SEC=$secondSec" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ("- build_pass_2_sec: {0}" -f $secondSec)

      - name: Show sccache stats
        shell: pwsh
        run: |
          sccache --show-stats

      - name: Save sccache artifacts cache (Windows)
        if: success() && steps.sccache_restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .cache/sccache
          key: ${{ steps.sccache_restore.outputs.cache-primary-key }}

      - name: Save Conan cache (Windows)
        if: success() && steps.conan_cache_restore.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ env.CONAN_HOME }}
          key: ${{ steps.conan_cache_restore.outputs.cache-primary-key }}
