syntax = "proto3";

package gateway.lb;

// 유지용: 단발형 라우팅 요청/응답 (초기 연동 시 사용)
message RouteRequest {
  string session_id = 1;
  bytes payload = 2;
  string gateway_id = 3;
}

message RouteResponse {
  bool accepted = 1;
  string reason = 2;
}

enum RouteMessageKind {
  ROUTE_KIND_INVALID = 0;
  ROUTE_KIND_CLIENT_HELLO = 1;
  ROUTE_KIND_CLIENT_PAYLOAD = 2;
  ROUTE_KIND_CLIENT_CLOSE = 3;
  ROUTE_KIND_SERVER_PAYLOAD = 4;
  ROUTE_KIND_SERVER_CLOSE = 5;
  ROUTE_KIND_SERVER_ERROR = 6;
  ROUTE_KIND_HEARTBEAT = 7;
}

message RouteMessage {
  string session_id = 1;
  string gateway_id = 2;
  string client_id = 3;
  string backend_id = 4;
  bytes payload = 5;
  RouteMessageKind kind = 6;
  string error = 7;
}

service LoadBalancerService {
  // 초기 호환성을 위해 남겨둔다. 기본 사용 경로는 Stream.
  rpc Forward(RouteRequest) returns (RouteResponse);
  rpc Stream(stream RouteMessage) returns (stream RouteMessage);
}
